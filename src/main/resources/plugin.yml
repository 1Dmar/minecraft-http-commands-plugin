name: HTTP-Commands
version: 1.2.0
main: me.lenaic.httpcommands.HttpCommandsPlugin
api-version: '1.21'
author: Lenaic GROLLEAU
description: Execute Minecraft commands via HTTP POST requests
plugin-type: PAPER

commands:
  http-commands:
    description: Reload the HTTP server configuration
    usage: /<command> reload
    permission: httpcommands.reload
  register:
    description: Confirm or deny account registration
    usage: /<command> <confirm|deny> <registrationId>

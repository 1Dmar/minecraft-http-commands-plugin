name: ProMcScure
version: 1.2.0
main: me.lenaic.httpcommands.HttpCommandsPlugin
api-version: '1.21'
author: ProMcScure plugin
description: Execute Minecraft commands via HTTP REST API - Easy setup, auto-generated token
plugin-type: PAPER

commands:
  promcscure:
    description: ProMcScure API server management (reload, status, token)
    usage: /<command> [reload|status|token]
    permission: promcscure.admin
    aliases:
      - http-commands
  register:
    description: Confirm or deny account registration
    usage: /<command> <confirm|deny> <registrationId>
